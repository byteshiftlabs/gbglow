# gbglow Key Bindings Configuration
# Format: action=SDLK_keyname
# 
# Available keys: https://wiki.libsdl.org/SDL2/SDLKeycodeLookup
# Examples: SDLK_a, SDLK_UP, SDLK_SPACE, SDLK_RETURN, SDLK_LSHIFT
#
# Game Boy Controls:
up=SDLK_Up
down=SDLK_Down
left=SDLK_Left
right=SDLK_Right
a=SDLK_Z
b=SDLK_X
start=SDLK_RETURN
select=SDLK_LSHIFT
