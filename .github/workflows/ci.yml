name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test-docs:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            libsdl2-dev \
            pkg-config \
            python3-pip \
            python3-venv \
            zenity

      - name: Build pinned cppcheck
        run: |
          mkdir -p .tools
          curl -L https://github.com/danmar/cppcheck/archive/refs/tags/2.20.0.tar.gz \
            | tar -xz -C .tools
          cmake -S .tools/cppcheck-2.20.0 -B .tools/cppcheck-build -DCMAKE_BUILD_TYPE=Release
          cmake --build .tools/cppcheck-build -j"$(nproc)"

      - name: Build, test, and run static analysis
        run: CPPCHECK_BIN="$PWD/.tools/cppcheck-build/bin/cppcheck" ./build.sh --clean

      - name: Build documentation
        run: |
          python3 -m pip install --break-system-packages -r docs/requirements.txt
          make -C docs html

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: gbglow-docs
          path: docs/_build/html
